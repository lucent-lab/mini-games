<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tap the Star · Lucent Lab Mini Games</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
        background: #f7f4ea;
      }
      main {
        width: min(880px, calc(100% - 24px));
        margin: 0 auto;
        padding: 24px 0;
      }
      a {
        display: inline-block;
        margin-bottom: 18px;
        color: inherit;
        font-weight: 800;
        text-decoration: none;
      }
      h1 {
        margin: 0 0 18px;
        font-size: clamp(36px, 8vw, 72px);
        letter-spacing: -0.05em;
      }
      .game {
        position: relative;
        min-height: 70vh;
        overflow: hidden;
        border-radius: 32px;
        background:
          radial-gradient(circle at 20% 20%, rgba(242, 221, 126, 0.8), transparent 28%),
          radial-gradient(circle at 80% 70%, rgba(141, 209, 255, 0.55), transparent 32%),
          #fff9db;
        box-shadow: 0 24px 80px rgba(23, 32, 51, 0.12);
      }
      .hud {
        position: absolute;
        z-index: 2;
        top: 18px;
        left: 18px;
        right: 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 40px rgba(23, 32, 51, 0.1);
        font-size: 22px;
      }
      #score {
        display: inline-grid;
        place-items: center;
        min-width: 48px;
        height: 48px;
        border-radius: 999px;
        background: #172033;
        color: white;
        font-weight: 900;
      }
      #star {
        position: absolute;
        transform: translate(-50%, -50%);
        display: grid;
        place-items: center;
        width: 104px;
        height: 104px;
        border: 0;
        border-radius: 999px;
        background: white;
        font-size: 56px;
        box-shadow: 0 18px 50px rgba(23, 32, 51, 0.16);
        cursor: pointer;
        animation: pop 320ms ease;
      }
      @keyframes pop {
        from { transform: translate(-50%, -50%) scale(0.78); }
        to { transform: translate(-50%, -50%) scale(1); }
      }
    </style>
  </head>
  <body>
    <main>
      <a href="../../">← Mini Games</a>
      <h1>⭐ Tap the Star</h1>
      <section class="game" aria-label="Tap the Star game">
        <div class="hud">
          <strong id="message">Tap the star</strong>
          <span id="score">0</span>
        </div>
        <button id="star" type="button" aria-label="Tap the star">⭐</button>
      </section>
    </main>

    <script>
      const star = document.getElementById("star");
      const scoreEl = document.getElementById("score");
      const message = document.getElementById("message");
      let score = 0;

      function moveStar() {
        star.style.left = `${12 + Math.random() * 76}%`;
        star.style.top = `${18 + Math.random() * 64}%`;
        star.style.animation = "none";
        star.offsetHeight;
        star.style.animation = "pop 320ms ease";
      }

      function updateMessage() {
        message.textContent = score === 0 ? "Tap the star" : score < 5 ? "Nice!" : score < 10 ? "Great!" : "Amazing!";
      }

      star.addEventListener("click", () => {
        score += 1;
        scoreEl.textContent = String(score);
        updateMessage();
        moveStar();
      });

      moveStar();
    </script>
  </body>
</html>
