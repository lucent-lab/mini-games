<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lucent Lab Mini Games</title>
    <meta name="description" content="Small educational mini games by Lucent Lab." />
    <style>
      *{box-sizing:border-box}body{margin:0;min-width:320px;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#172033;background:#f7f4ea}button{font:inherit}.page,.gamePage{width:min(960px,calc(100% - 32px));margin:0 auto;padding:32px 0}.hero{display:grid;gap:16px;margin:36px 0 28px}.brand{display:inline-flex;align-items:center;gap:10px;width:fit-content;padding:10px 14px;border-radius:999px;background:#fff;box-shadow:0 10px 30px rgba(23,32,51,.08);font-weight:800}.brandIcon{display:inline-grid;place-items:center;width:40px;height:40px;border-radius:999px;background:#f2dd7e}.hero h1,.gameHeader h1{margin:0;font-size:clamp(44px,8vw,88px);line-height:.95;letter-spacing:-.06em}.hero p,.gameHeader p{margin:0;color:#596174;font-size:clamp(18px,2.4vw,24px)}.gameGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}.gameCard{display:grid;gap:12px;min-height:240px;padding:24px;border:0;border-radius:28px;text-align:left;background:#fff;color:inherit;box-shadow:0 16px 50px rgba(23,32,51,.1);cursor:pointer;transition:transform 160ms ease,box-shadow 160ms ease}.gameCard:hover,.gameCard:focus-visible{transform:translateY(-4px);box-shadow:0 24px 70px rgba(23,32,51,.14)}.gameEmoji{font-size:64px}.gameTitle{font-size:26px;font-weight:900}.gameDescription{color:#596174;line-height:1.45}.playButton{align-self:end;display:inline-grid;place-items:center;width:fit-content;padding:12px 18px;border-radius:999px;background:#172033;color:#fff;font-weight:900}.gameHeader{display:grid;gap:24px;margin-bottom:24px}.backButton{display:inline-flex;align-items:center;gap:8px;width:fit-content;padding:12px 16px;border:0;border-radius:999px;color:#172033;background:#fff;font-weight:900;box-shadow:0 10px 30px rgba(23,32,51,.08);cursor:pointer}.gameFrame{min-height:560px;overflow:hidden;border-radius:32px;background:#fff;box-shadow:0 24px 80px rgba(23,32,51,.12)}.tapGame{position:relative;min-height:560px;overflow:hidden;background:radial-gradient(circle at 20% 20%,rgba(242,221,126,.8),transparent 28%),radial-gradient(circle at 80% 70%,rgba(141,209,255,.55),transparent 32%),#fff9db}.tapGameHud{position:absolute;z-index:2;top:18px;left:18px;right:18px;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 18px;border-radius:22px;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);box-shadow:0 10px 40px rgba(23,32,51,.1);font-size:22px}.tapGameHud span{display:inline-grid;place-items:center;min-width:48px;height:48px;border-radius:999px;background:#172033;color:#fff;font-weight:900}.starTarget{position:absolute;transform:translate(-50%,-50%);display:grid;place-items:center;width:104px;height:104px;border:0;border-radius:999px;background:#fff;font-size:56px;box-shadow:0 18px 50px rgba(23,32,51,.16);cursor:pointer;animation:pop 320ms ease}@keyframes pop{from{transform:translate(-50%,-50%) scale(.78)}to{transform:translate(-50%,-50%) scale(1)}}@media(max-width:640px){.page,.gamePage{width:min(100% - 20px,960px);padding:20px 0}.gameFrame,.tapGame{min-height:70vh}.gameCard{min-height:200px}}
    </style>
  </head>
  <body>
    <main id="home" class="page">
      <section class="hero">
        <div class="brand"><span class="brandIcon">🎮</span><span>Lucent Lab</span></div>
        <h1>Mini Games</h1>
        <p>Small playful experiments. Pick one and start.</p>
      </section>
      <section class="gameGrid" aria-label="Available games">
        <button class="gameCard" type="button" id="playTapStar">
          <span class="gameEmoji" aria-hidden="true">⭐</span>
          <span class="gameTitle">Tap the Star</span>
          <span class="gameDescription">A tiny example game used as the first template.</span>
          <span class="playButton">Play</span>
        </button>
      </section>
    </main>
    <main id="game" class="gamePage" hidden>
      <header class="gameHeader">
        <button class="backButton" type="button" id="backHome">← Home</button>
        <div><h1><span aria-hidden="true">⭐</span> Tap the Star</h1><p>A tiny example game used as the first template.</p></div>
      </header>
      <section class="gameFrame">
        <div class="tapGame">
          <div class="tapGameHud"><strong id="message">Tap the star</strong><span id="score">0</span></div>
          <button class="starTarget" type="button" aria-label="Tap the star" id="star">⭐</button>
        </div>
      </section>
    </main>
    <script>
      const home=document.getElementById('home');const game=document.getElementById('game');const star=document.getElementById('star');const scoreEl=document.getElementById('score');const message=document.getElementById('message');let score=0;function moveStar(){star.style.left=(12+Math.random()*76)+'%';star.style.top=(18+Math.random()*64)+'%';star.style.animation='none';star.offsetHeight;star.style.animation='pop 320ms ease'}function updateMessage(){message.textContent=score===0?'Tap the star':score<5?'Nice!':score<10?'Great!':'Amazing!'}document.getElementById('playTapStar').addEventListener('click',()=>{home.hidden=true;game.hidden=false;moveStar()});document.getElementById('backHome').addEventListener('click',()=>{game.hidden=true;home.hidden=false});star.addEventListener('click',()=>{score+=1;scoreEl.textContent=String(score);updateMessage();moveStar()});moveStar();
    </script>
  </body>
</html>
