<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lucent Lab Mini Games</title>
    <meta name="description" content="Small browser mini games by Lucent Lab." />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
        background: #f7f4ea;
      }
      main {
        width: min(880px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }
      header { margin-bottom: 32px; }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        background: white;
        font-weight: 800;
        box-shadow: 0 10px 30px rgba(23, 32, 51, 0.08);
      }
      h1 {
        margin: 24px 0 8px;
        font-size: clamp(44px, 9vw, 88px);
        line-height: 0.95;
        letter-spacing: -0.06em;
      }
      p {
        margin: 0;
        color: #596174;
        font-size: clamp(18px, 2.5vw, 24px);
      }
      .games {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 18px;
      }
      .game {
        display: grid;
        gap: 12px;
        min-height: 220px;
        padding: 24px;
        border-radius: 28px;
        background: white;
        color: inherit;
        text-decoration: none;
        box-shadow: 0 16px 50px rgba(23, 32, 51, 0.1);
        transition: transform 160ms ease, box-shadow 160ms ease;
      }
      .game:hover,
      .game:focus-visible {
        transform: translateY(-4px);
        box-shadow: 0 24px 70px rgba(23, 32, 51, 0.14);
      }
      .emoji { font-size: 64px; }
      .title { font-size: 26px; font-weight: 900; }
      .description { color: #596174; line-height: 1.45; }
      .button {
        align-self: end;
        width: fit-content;
        padding: 12px 18px;
        border-radius: 999px;
        background: #172033;
        color: white;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="brand">🎮 Lucent Lab</div>
        <h1>Mini Games</h1>
        <p>Small playful experiments. Pick one and start.</p>
      </header>

      <section class="games" aria-label="Available games">
        <a class="game" href="./games/bee-pollen-flight/">
          <span class="emoji" aria-hidden="true">🐝</span>
          <span class="title">Bee Pollen Flight</span>
          <span class="description">Fly around a tiny round garden, collect flower pollen, and bring it back to the hive.</span>
          <span class="button">Play</span>
        </a>

        <a class="game" href="./games/tap-the-star/">
          <span class="emoji" aria-hidden="true">⭐</span>
          <span class="title">Tap the Star</span>
          <span class="description">A tiny example game used as the first template.</span>
          <span class="button">Play</span>
        </a>
      </section>
    </main>
  </body>
</html>
